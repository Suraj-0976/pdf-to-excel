<!doctype html>
<html lang="en">
  <head>
    <title>PDF to Excel Extractor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5.3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #eef2f7, #e3e9f2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .main-card {
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 35px;
        background: #ffffff;
      }

      .title {
        font-weight: 700;
        color: #2c3e50;
      }

      .upload-box {
        border: 2px dashed #c7cfd9;
        border-radius: 12px;
        padding: 25px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
      }

      .upload-box:hover {
        border-color: #0d6efd;
        background: #f8fbff;
      }

      .progress {
        height: 22px;
        border-radius: 20px;
        overflow: hidden;
      }

      .progress-bar {
        font-weight: 600;
      }

      .download-btn {
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="main-card">
            <h3 class="text-center title mb-4">PDF to Excel Extractor</h3>

            <form id="uploadForm">
              <div class="upload-box mb-3">
                <input
                  type="file"
                  id="pdfFile"
                  class="form-control"
                  accept=".pdf"
                  required
                />
                <div class="text-muted mt-2">Choose PDF File</div>
              </div>

              <button class="btn btn-primary w-100">
                Upload & Generate Excel
              </button>
            </form>

            <div class="progress mt-4" style="display: none" id="progressBox">
              <div
                class="progress-bar bg-success"
                id="progressFill"
                style="width: 0%"
              >
                0%
              </div>
            </div>

            <div class="text-center mt-3" id="message"></div>

            <div class="text-center download-btn" id="downloadWrapper"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
const form = document.getElementById('uploadForm');
const progressBox = document.getElementById('progressBox');
const progressFill = document.getElementById('progressFill');
const message = document.getElementById('message');
const downloadWrapper = document.getElementById('downloadWrapper');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    const fileInput = document.getElementById('pdfFile');
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a PDF file");
        return;
    }

    const formData = new FormData();
    formData.append("pdf", file);

    progressBox.style.display = "block";
    message.innerHTML = "";
    downloadWrapper.innerHTML = "";

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/upload", true);
    xhr.responseType = "blob";   // ⭐ IMPORTANT

    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = percent + "%";
            progressFill.innerHTML = percent + "%";
        }
    };

    xhr.onload = function() {
        progressFill.style.width = "100%";
        progressFill.innerHTML = "100%";

        message.innerHTML = "<span class='text-success'>File Processed Successfully</span>";

        // ⭐ AUTO DOWNLOAD
        const blob = xhr.response;
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);

        // filename extract karne ki try
        const disposition = xhr.getResponseHeader("Content-Disposition");
        let fileName = "result.xlsx";

        if (disposition && disposition.indexOf("filename=") !== -1) {
            fileName = disposition.split("filename=")[1].replace(/"/g, "");
        }

        link.download = fileName;
        link.click();
    };

    xhr.onerror = function() {
        message.innerHTML = "<span class='text-danger'>Upload Failed</span>";
    };

    xhr.send(formData);
});
</script>
  </body>
</html>
